<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>To Do List</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <header>
    <h1>To Do List</h1>
    <p>Made by Martin Lister</p>
  </header>

  <main>

    <section id="add-task">
      <input type="text" id="task-input" placeholder="Add a new task..."/>
      <button onclick="addTask()">Add</button>
    </section>

    <section id="filters">
      <button class="filter-btn active" onclick="filterTasks('all', this)">All</button>
      <button class="filter-btn" onclick="filterTasks('active', this)">Active</button>
      <button class="filter-btn" onclick="filterTasks('done', this)">Done</button>
    </section>

    <section id="task-info">
      <small id="task-count">0 tasks left</small>
    </section>

    <ul id="task-list"></ul>

  </main>

  <footer>
    <p>Built with HTML, CSS and JavaScript</p>
  </footer>

  <script src="script.js"></script>

</body>
</html>
